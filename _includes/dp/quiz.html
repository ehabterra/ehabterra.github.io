<div class="dp-quiz" data-dp-quiz>
  <div class="dp-quiz__head">
    <h2 id="quiz" style="margin:0;border:0;padding:0;">Check your understanding</h2>
    <span class="dp-quiz__score" data-dp-score>Score: 0 / {{ page.quiz | size }}</span>
  </div>
  {% for q in page.quiz %}
  <div class="dp-q">
    <p class="dp-q__prompt">{{ forloop.index }}. {{ q.q }}</p>
    {% for opt in q.options %}
      <button class="dp-opt" data-correct="{% if opt.correct %}true{% else %}false{% endif %}">{{ opt.text }}</button>
    {% endfor %}
    {% if q.explain %}<p class="dp-q__explain">{{ q.explain }}</p>{% endif %}
  </div>
  {% endfor %}
</div>
