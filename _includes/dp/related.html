{% if page.related %}
<h2 id="related-patterns">Related patterns</h2>
<div class="dp-grid">
  {% for slug in page.related %}
    {% assign p = site.patterns | where: "slug", slug | first %}
    {% if p %}
    <a class="dp-card" data-cat="{{ p.category }}" data-slug="{{ p.slug }}" href="{{ p.url | relative_url }}">
      <span class="dp-card__num">{{ p.category | upcase }}</span>
      <span class="dp-card__title">{{ p.title }}</span>
      <p class="dp-card__intent">{{ p.intent }}</p>
    </a>
    {% endif %}
  {% endfor %}
</div>
{% endif %}
